<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satija Paper - System Master</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,700;9..144,800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0c1a2b;
            --primary-light: #162d4a;
            --accent: #0066ff;
            --accent-light: #4d94ff;
            --accent-glow: rgba(0, 102, 255, 0.12);
            --bg: #f4f6f9;
            --bg-card: #ffffff;
            --sidebar-w: 264px;
            --text: #0f1d2e;
            --text-2: #5a6a7e;
            --text-3: #94a3b8;
            --border: #e4e8ee;
            --ok: #00c48c;
            --warn: #f5a623;
            --danger: #ff4757;
            --purple: #7c3aed;
            --r: 12px;
            --shadow-s: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-m: 0 4px 16px rgba(0,0,0,0.06);
            --shadow-l: 0 16px 48px rgba(0,0,0,0.1);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;}

        /* ── LOGIN ── */
        .login-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#070e1a 0%,#0f1f38 50%,#070e1a 100%);transition:opacity .5s,visibility .5s;}
        .login-overlay.hidden{opacity:0;visibility:hidden;pointer-events:none;}
        .login-bg{position:absolute;inset:0;background:radial-gradient(circle at 25% 40%,rgba(0,102,255,.08),transparent 55%),radial-gradient(circle at 75% 60%,rgba(124,58,237,.06),transparent 50%);animation:bgPulse 12s ease-in-out infinite alternate;}
        @keyframes bgPulse{0%{opacity:.5}100%{opacity:1}}
        .login-card{position:relative;width:420px;background:rgba(255,255,255,.03);backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.07);border-radius:24px;padding:48px 40px;animation:cardUp .6s var(--ease);}
        @keyframes cardUp{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}
        .login-brand{text-align:center;margin-bottom:36px;}
        .login-logo{width:80px;height:80px;border-radius:18px;object-fit:contain;margin-bottom:16px;box-shadow:0 8px 32px rgba(0,0,0,.3);background:rgba(255,255,255,.05);padding:4px;}
        .login-brand h1{font-family:'Fraunces',serif;font-size:24px;font-weight:800;color:#fff;letter-spacing:1.5px;}
        .login-brand-url{font-size:11px;color:var(--accent-light);margin-top:4px;letter-spacing:.5px;}
        .login-brand-sub{font-size:12px;color:rgba(255,255,255,.35);margin-top:8px;font-weight:600;}
        .login-role-tabs{display:flex;gap:6px;margin-bottom:28px;background:rgba(255,255,255,.05);border-radius:14px;padding:4px;}
        .login-role-tab{flex:1;padding:12px;border:none;background:0;color:rgba(255,255,255,.45);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;border-radius:11px;transition:.25s var(--ease);display:flex;align-items:center;justify-content:center;gap:7px;}
        .login-role-tab.active{background:var(--accent);color:#fff;box-shadow:0 4px 18px rgba(0,102,255,.35);}
        .login-role-tab:hover:not(.active){color:rgba(255,255,255,.7);background:rgba(255,255,255,.07);}
        .login-field{margin-bottom:18px;}
        .login-field label{display:block;font-size:11px;font-weight:700;color:rgba(255,255,255,.4);margin-bottom:7px;text-transform:uppercase;letter-spacing:.8px;}
        .login-input-wrap{position:relative;}
        .login-input-wrap>i{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.2);font-size:14px;}
        .login-input{width:100%;padding:13px 16px 13px 44px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;color:#fff;font-size:13.5px;font-family:inherit;outline:0;transition:.25s var(--ease);}
        .login-input::placeholder{color:rgba(255,255,255,.2);}
        .login-input:focus{border-color:var(--accent);background:rgba(0,102,255,.06);box-shadow:0 0 0 3px rgba(0,102,255,.12);}
        .login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#4338ca);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:.25s var(--ease);margin-top:8px;}
        .login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,102,255,.35);}
        .login-error{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.25);color:#fca5a5;padding:10px 14px;border-radius:10px;font-size:12px;margin-bottom:16px;display:none;align-items:center;gap:7px;}
        .login-error.show{display:flex;}
        .toggle-password{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:0;border:0;color:rgba(255,255,255,.25);cursor:pointer;font-size:13px;padding:4px;}

        /* ── APP LAYOUT ── */
        .app-container{display:none;height:100vh;}
        .app-container.visible{display:flex;}

        /* ── SIDEBAR ── */
        .sidebar{width:var(--sidebar-w);background:var(--primary);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
        .sidebar::-webkit-scrollbar{width:0;}
        .brand-box{padding:24px 20px 18px;display:flex;flex-direction:column;align-items:center;gap:6px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:6px;}
        .brand-logo{width:60px;height:60px;border-radius:50%;object-fit:contain;padding:3px;box-shadow:0 4px 20px rgba(0,0,0,.2);}
        .brand-text{color:#fff;font-family:'Fraunces',serif;font-size:16px;font-weight:800;letter-spacing:1.5px;margin-top:4px;}
        .brand-url{color:var(--accent-light);font-size:10px;text-decoration:none;font-weight:600;opacity:.8;}
        .brand-url:hover{opacity:1;text-decoration:underline;}
        .sidebar-label{padding:18px 22px 6px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.4px;color:rgba(255,255,255,.22);}

        .menu-btn{background:0;border:0;padding:11px 22px;text-align:left;font-size:13px;color:rgba(255,255,255,.5);cursor:pointer;transition:.2s var(--ease);display:flex;align-items:center;gap:11px;border-left:3px solid transparent;font-family:inherit;font-weight:600;position:relative;}
        .menu-btn i{width:18px;text-align:center;font-size:13px;transition:.2s;}
        .menu-btn:hover{background:rgba(255,255,255,.04);color:rgba(255,255,255,.85);}
        .menu-btn.active{background:rgba(0,102,255,.12);color:var(--accent-light);border-left-color:var(--accent-light);}
        .menu-btn .count-badge{margin-left:auto;background:rgba(255,255,255,.08);color:rgba(255,255,255,.45);font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;min-width:22px;text-align:center;}
        .menu-btn.active .count-badge{background:rgba(0,102,255,.2);color:var(--accent-light);}

        .sidebar-user{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px;}
        .sidebar-avatar{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;flex-shrink:0;}
        .sidebar-uinfo{flex:1;min-width:0;}
        .sidebar-uname{font-size:12px;font-weight:700;color:rgba(255,255,255,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .sidebar-urole{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.5px;font-weight:700;}
        .sidebar-logout{background:0;border:0;color:rgba(255,255,255,.25);cursor:pointer;font-size:15px;padding:6px;border-radius:8px;transition:.2s;}
        .sidebar-logout:hover{color:var(--danger);background:rgba(255,71,87,.08);}

        /* ── MAIN ── */
        .main-content{flex:1;display:flex;flex-direction:column;overflow-y:auto;}
        .header-bar{display:flex;justify-content:space-between;align-items:center;background:var(--bg-card);padding:14px 28px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
        .page-title{font-size:18px;font-weight:800;color:var(--text);}
        .header-right{display:flex;align-items:center;gap:14px;}
        .search-wrap{position:relative;width:260px;}
        .search-box{padding:9px 14px 9px 36px;border:1.5px solid var(--border);border-radius:10px;width:100%;outline:0;transition:.25s var(--ease);font-size:12.5px;font-family:inherit;background:var(--bg);}
        .search-box:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-glow);}
        .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:12px;}

        .content{padding:22px 28px 60px;flex:1;}

        /* ── CARDS ── */
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px;}
        .card{background:var(--bg-card);border-radius:var(--r);padding:20px;box-shadow:var(--shadow-s);border:1px solid var(--border);display:flex;flex-direction:column;transition:.25s var(--ease);animation:fadeUp .4s var(--ease) both;position:relative;overflow:hidden;}
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
        .card.cat-Sales::before{background:linear-gradient(90deg,#0066ff,#4d94ff);}
        .card.cat-Purchase::before{background:linear-gradient(90deg,#00c48c,#66e0bb);}
        .card.cat-Management::before{background:linear-gradient(90deg,#f5a623,#ffc870);}
        .card.cat-HR::before{background:linear-gradient(90deg,#7c3aed,#a78bfa);}
        .card.cat-Finance::before{background:linear-gradient(90deg,#ff4757,#ff8a96);}
        .card.cat-Support::before{background:linear-gradient(90deg,#06b6d4,#67e8f9);}
        .card.cat-My::before{background:linear-gradient(90deg,#8b5cf6,#c084fc);}
        @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
        .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-m);}
        .card-tag{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;padding:3px 9px;border-radius:6px;margin-bottom:10px;}
        .tag-Sales{background:#e8f0ff;color:#0052cc;} .tag-Purchase{background:#e6faf3;color:#00795c;} .tag-Management{background:#fff5e0;color:#8a5d00;} .tag-HR{background:#f3e8ff;color:#5b21b6;} .tag-Finance{background:#ffe8ea;color:#c41432;} .tag-Support{background:#e0f7fa;color:#0277bd;} .tag-My{background:#f0e6ff;color:#6d28d9;}
        .card h3{font-size:15px;font-weight:800;color:var(--text);margin-bottom:12px;line-height:1.3;}
        .people{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
        .role-g{display:flex;flex-direction:column;gap:2px;}
        .role-l{font-size:8px;text-transform:uppercase;color:var(--text-3);font-weight:800;letter-spacing:.6px;margin-left:2px;}
        .badge{padding:4px 9px;border-radius:6px;background:var(--bg);border:1px solid var(--border);color:var(--text);display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;}
        .badge i{font-size:10px;}
        .b-pc{border-left:3px solid var(--purple);} .b-pc i{color:var(--purple);}
        .b-sv{border-left:3px solid var(--warn);} .b-sv i{color:var(--warn);}
        .b-ex{border-left:3px solid var(--ok);} .b-ex i{color:var(--ok);}
        .actions{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-top:auto;}
        .btn{text-decoration:none;padding:7px 6px;border-radius:8px;font-size:11px;text-align:center;font-weight:700;display:flex;align-items:center;justify-content:center;gap:4px;transition:.2s var(--ease);font-family:inherit;position:relative;}
        .btn:hover{filter:brightness(.92);transform:translateY(-1px);}
        .btn-fms{background:#e8f0ff;color:#0052cc;} .btn-form{background:#f3e8ff;color:#5b21b6;} .btn-sheet{background:#e6faf3;color:#00795c;} .btn-check{background:#fff0e0;color:#8a4500;} .btn-video{background:#ffe8ea;color:#b91c1c;} .btn-dash{background:#e0f2fe;color:#0369a1;} .btn-admin{background:#fef3c7;color:#92400e;} .btn-gp{background:#ede9fe;color:#5b21b6;}
        .btn.disabled-link{opacity:.3;pointer-events:none;cursor:not-allowed;}
        .lock-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.7);color:#fff;font-size:8px;padding:2px 6px;border-radius:4px;white-space:nowrap;font-weight:700;letter-spacing:.3px;}
        .empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-3);}
        .empty-state i{font-size:32px;margin-bottom:10px;display:block;opacity:.5;}

        /* ── ADMIN PANEL ── */
        .admin-panel{display:none;}
        .admin-panel.visible{display:block;}
        .admin-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
        .admin-top h3{font-size:17px;font-weight:800;}
        .add-btn{padding:10px 20px;background:var(--accent);color:#fff;border:0;border-radius:10px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:7px;transition:.25s var(--ease);}
        .add-btn:hover{background:#0052cc;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,102,255,.25);}
        .tbl-wrap{background:var(--bg-card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow-s);}
        .tbl{width:100%;border-collapse:collapse;}
        .tbl th{background:var(--bg);padding:11px 16px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--text-2);border-bottom:1px solid var(--border);}
        .tbl td{padding:12px 16px;font-size:12px;border-bottom:1px solid var(--border);color:var(--text);}
        .tbl tr:last-child td{border-bottom:0;}
        .tbl tr:hover td{background:#f8fafc;}
        .role-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;}
        .role-pill.admin{background:#ffe8ea;color:#b91c1c;} .role-pill.employee{background:#e8f0ff;color:#0052cc;}
        .access-pills{display:flex;flex-wrap:wrap;gap:3px;}
        .ap{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700;}
        .ap-Sales{background:#e8f0ff;color:#0052cc;} .ap-Purchase{background:#e6faf3;color:#00795c;} .ap-Management{background:#fff5e0;color:#8a5d00;} .ap-HR{background:#f3e8ff;color:#5b21b6;} .ap-Finance{background:#ffe8ea;color:#c41432;} .ap-All{background:var(--primary);color:#fff;}
        .tbl-act{background:0;border:0;cursor:pointer;padding:5px 7px;border-radius:6px;transition:.2s;font-size:13px;}
        .tbl-act:hover{background:var(--bg);}
        .tbl-act.edit{color:var(--accent);} .tbl-act.delete{color:var(--danger);}

        /* ── MODAL ── */
        .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:5000;display:none;align-items:center;justify-content:center;}
        .modal-bg.show{display:flex;}
        .modal-box{background:#fff;border-radius:18px;width:480px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-l);animation:modalUp .3s var(--ease);}
        @keyframes modalUp{from{transform:translateY(16px) scale(.97);opacity:0}to{transform:none;opacity:1}}
        .modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--border);}
        .modal-head h3{font-size:16px;font-weight:800;}
        .modal-x{background:0;border:0;font-size:16px;color:var(--text-3);cursor:pointer;padding:4px 8px;border-radius:8px;transition:.2s;}
        .modal-x:hover{background:var(--bg);color:var(--text);}
        .modal-body{padding:22px;}
        .mf{margin-bottom:16px;}
        .mf label{display:block;font-size:11px;font-weight:700;color:var(--text-2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
        .mf input,.mf select{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;outline:0;transition:.25s;background:#fff;}
        .mf input:focus,.mf select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
        .chk-group{display:flex;flex-wrap:wrap;gap:7px;}
        .chk-pill{display:flex;align-items:center;gap:5px;padding:7px 13px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:.2s;font-size:12px;font-weight:600;user-select:none;}
        .chk-pill:hover{border-color:var(--accent);background:var(--accent-glow);}
        .chk-pill.checked{background:var(--accent);color:#fff;border-color:var(--accent);}
        .chk-pill input{display:none;}
        .modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
        .mbtn{padding:9px 20px;border-radius:10px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;border:0;transition:.2s;}
        .mbtn.sec{background:var(--bg);color:var(--text-2);} .mbtn.sec:hover{background:#e2e8f0;}
        .mbtn.pri{background:var(--accent);color:#fff;} .mbtn.pri:hover{background:#0052cc;}
        .proc-section{margin-top:4px;}
        .proc-section summary{cursor:pointer;font-size:11px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px;padding:5px 0;user-select:none;}
        .proc-section summary:hover{color:var(--accent);}
        .proc-list{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:6px;max-height:200px;overflow-y:auto;padding:3px;}
        .proc-item{display:flex;align-items:center;gap:5px;font-size:11px;padding:5px 7px;border-radius:6px;cursor:pointer;transition:.2s;}
        .proc-item:hover{background:var(--bg);}
        .proc-item input{accent-color:var(--accent);}

        @media(max-width:768px){
            .sidebar{display:none;}
            .header-bar{padding:10px 14px;}
            .content{padding:14px;}
            .grid{grid-template-columns:1fr;}
            .login-card{width:92%;padding:28px 20px;}
            .search-wrap{width:180px;}
        }
    </style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div class="login-overlay" id="loginOverlay">
    <div class="login-bg"></div>
    <div class="login-card">
        <div class="login-brand">
            <!-- ✏️ CHANGE YOUR LOGIN LOGO HERE — Replace the src="" URL below with your own logo URL or base64 -->
            <img src="https://lh3.googleusercontent.com/d/18xzMwZ_XE11XbaqPPOZhX8-ITt5DAm9h" alt="Satija Paper" class="login-logo">
            <h1>SATIJA PAPER</h1>
            <div class="login-brand-url">www.satijapaper.com</div>
            <div class="login-brand-sub">System Master — Process Dashboard</div>
        </div>
        <div class="login-role-tabs">
            <button class="login-role-tab active" onclick="setLoginRole('Employee')" id="tabEmployee"><i class="fas fa-user"></i> Employee</button>
            <button class="login-role-tab" onclick="setLoginRole('Admin')" id="tabAdmin"><i class="fas fa-shield-halved"></i> Admin</button>
        </div>
        <div class="login-error" id="loginError"><i class="fas fa-circle-exclamation"></i><span id="loginErrorMsg"></span></div>
        <div class="login-field">
            <label>Username</label>
            <div class="login-input-wrap"><i class="fas fa-user"></i><input type="text" class="login-input" id="loginUser" placeholder="Enter your username" autocomplete="off"></div>
        </div>
        <div class="login-field">
            <label>Password</label>
            <div class="login-input-wrap"><i class="fas fa-lock"></i><input type="password" class="login-input" id="loginPass" placeholder="Enter your password"><button class="toggle-password" onclick="togglePwd()" type="button"><i class="fas fa-eye" id="pwdEye"></i></button></div>
        </div>
        <button class="login-btn" onclick="handleLogin()">Sign In <i class="fas fa-arrow-right" style="margin-left:6px;font-size:12px;"></i></button>
    </div>
</div>

<!-- ═══ APP ═══ -->
<div class="app-container" id="appContainer">
    <div class="sidebar">
        <div class="brand-box">
            <!-- ✏️ CHANGE YOUR SIDEBAR LOGO HERE — Replace the src="" URL below with your own logo URL or base64 -->
            <img src="https://lh3.googleusercontent.com/d/18xzMwZ_XE11XbaqPPOZhX8-ITt5DAm9h" alt="Satija Paper" class="brand-logo">
            <div class="brand-text">SATIJA PAPER</div>
            <a href="https://www.satijapaper.com" target="_blank" class="brand-url">www.satijapaper.com</a>
        </div>

        <div class="sidebar-label">Navigation</div>
        <button class="menu-btn active" onclick="filterCat('All',this)"><i class="fas fa-grid-2"></i> All Processes <span class="count-badge" id="cntAll">0</span></button>
        <button class="menu-btn" onclick="filterCat('Sales',this)"><i class="fas fa-chart-mixed"></i> Sales &amp; CRM <span class="count-badge" id="cntSales">0</span></button>

function getUsers(){const s=localStorage.getItem(SK);if(!s){localStorage.setItem(SK,JSON.stringify(defUsers));return[...defUsers];}return JSON.parse(s);}
function saveUsers(u){localStorage.setItem(SK,JSON.stringify(u));}
function getSess(){const s=localStorage.getItem(SS);return s?JSON.parse(s):null;}
function setSess(u){localStorage.setItem(SS,JSON.stringify(u));}
function clearSess(){localStorage.removeItem(SS);}

let loginRole="Employee";
function setLoginRole(r){loginRole=r;document.getElementById('tabEmployee').classList.toggle('active',r==='Employee');document.getElementById('tabAdmin').classList.toggle('active',r==='Admin');document.getElementById('loginError').classList.remove('show');}
function togglePwd(){const i=document.getElementById('loginPass'),ic=document.getElementById('pwdEye');if(i.type==='password'){i.type='text';ic.className='fas fa-eye-slash';}else{i.type='password';ic.className='fas fa-eye';}}

function handleLogin(){
    const u=document.getElementById('loginUser').value.trim().toLowerCase(),p=document.getElementById('loginPass').value;
    const err=document.getElementById('loginError'),msg=document.getElementById('loginErrorMsg');
    if(!u||!p){msg.textContent="Please enter both username and password.";err.classList.add('show');return;}
    const users=getUsers(),found=users.find(x=>x.username.toLowerCase()===u&&x.password===p);
    if(!found){msg.textContent="Invalid username or password.";err.classList.add('show');return;}
    if(found.role!==loginRole){msg.textContent=`This account is ${found.role}, not ${loginRole}.`;err.classList.add('show');return;}
    err.classList.remove('show');setSess(found);enterApp(found);
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!document.getElementById('loginOverlay').classList.contains('hidden'))handleLogin();});

function handleLogout(){clearSess();document.getElementById('appContainer').classList.remove('visible');document.getElementById('loginOverlay').classList.remove('hidden');document.getElementById('loginUser').value='';document.getElementById('loginPass').value='';document.getElementById('loginError').classList.remove('show');curView='cards';}

let curUser=null,curCat='All',curView='cards';

function enterApp(user){
    curUser=user;
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('appContainer').classList.add('visible');
    document.getElementById('sAvatar').textContent=user.name.charAt(0).toUpperCase();
    document.getElementById('sName').textContent=user.name;
    document.getElementById('sRole').textContent=user.role;
    const isA=user.role==='Admin';
    document.getElementById('adminNavLabel').style.display=isA?'':'none';
    document.getElementById('adminNavBtn').style.display=isA?'':'none';
    curCat='All';curView='cards';
    setActive(document.querySelector('.menu-btn'));
    updateCounts();
    runFilter();
}

function hasDept(u,c){if(!u)return false;if(u.role==='Admin')return true;if(u.deptAccess.includes('All'))return true;return u.deptAccess.includes(c);}
function hasProc(u,n){if(!u)return false;if(u.role==='Admin')return true;if(!u.processAccess||!u.processAccess.length)return true;return u.processAccess.includes(n);}

function getCatClass(c){if(c==='My System')return 'My';return c;}
function getCatLabel(c){if(c==='My System')return 'My System';return c;}

function updateCounts(){
    const cats={All:0,Sales:0,Purchase:0,Management:0,HR:0,Finance:0,Support:0,'My System':0};
    DB.forEach(d=>{cats.All++;if(cats[d.cat]!==undefined)cats[d.cat]++;});
    document.getElementById('cntAll').textContent=cats.All;
    document.getElementById('cntSales').textContent=cats.Sales;
    document.getElementById('cntPurchase').textContent=cats.Purchase;
    document.getElementById('cntManagement').textContent=cats.Management;
    document.getElementById('cntHR').textContent=cats.HR;
    document.getElementById('cntFinance').textContent=cats.Finance;
    document.getElementById('cntSupport').textContent=cats.Support;
    document.getElementById('cntMy').textContent=cats['My System'];
}

const box=document.getElementById('cardBox'),hdr=document.getElementById('pageHeader');

function renderCards(data){
    box.innerHTML="";
    if(!data.length){box.innerHTML=`<div class="empty-state"><i class="fas fa-box-open"></i><p>No processes found.</p></div>`;return;}
    data.forEach((it,i)=>{
        const ok=hasDept(curUser,it.cat)&&hasProc(curUser,it.name);
        const dc=ok?'':' disabled-link';
        const mb=(url,cls,ico,lbl)=>{
            if(!url)return'';
            return `<a href="${ok?url:'#'}" ${ok?'target="_blank"':''} class="btn ${cls}${dc}" ${!ok?'onclick="return false;"':''}><i class="${ico}"></i> ${lbl}${!ok?'<span class="lock-badge"><i class="fas fa-lock"></i> Locked</span>':''}</a>`;
        };
        let btns='';
        btns+=mb(it.links.fms,'btn-fms','fas fa-table-cells','FMS');
        btns+=mb(it.links.form,'btn-form','fab fa-google-drive','Form');
        btns+=mb(it.links.sheet,'btn-sheet','fas fa-file-spreadsheet','Sheet');
        btns+=mb(it.links.check,'btn-check','fas fa-square-check','Checklist');
        btns+=mb(it.links.video,'btn-video','fas fa-circle-play','Training');
        btns+=mb(it.links.videoBCI,'btn-video','fas fa-circle-play','Training (BCI)');
        btns+=mb(it.links.dashEmp,'btn-dash','fas fa-chart-pie','Emp Dashboard');
        btns+=mb(it.links.dashPC,'btn-dash','fas fa-chart-line','PC Dashboard');
        btns+=mb(it.links.admin,'btn-admin','fas fa-user-gear','Admin Panel');
        btns+=mb(it.links.gpDash,'btn-gp','fas fa-chart-column','GP Dashboard');
        if(!btns)btns='<div style="grid-column:span 2;text-align:center;color:#ccc;font-size:11px;">No Links</div>';
        let badges='';
        if(it.pc&&it.pc!=="-")badges+=`<div class="role-g"><span class="role-l">PC/EA</span><span class="badge b-pc"><i class="fas fa-shield-halved"></i>${it.pc}</span></div>`;
        if(it.solver&&it.solver!=="-")badges+=`<div class="role-g"><span class="role-l">Solver</span><span class="badge b-sv"><i class="fas fa-wrench"></i>${it.solver}</span></div>`;
        if(it.exec&&it.exec!=="-")badges+=`<div class="role-g"><span class="role-l">Executive</span><span class="badge b-ex"><i class="fas fa-user-tie"></i>${it.exec}</span></div>`;
        const cc=getCatClass(it.cat);
        box.innerHTML+=`<div class="card cat-${cc}" style="animation-delay:${i*.03}s;${!ok?'opacity:.5;':''}"><span class="card-tag tag-${cc}">${getCatLabel(it.cat)}</span><h3>${it.name}</h3><div class="people">${badges}</div><div class="actions">${btns}</div></div>`;
    });
}

function setActive(el){document.querySelectorAll('.menu-btn').forEach(b=>b.classList.remove('active'));if(el)el.classList.add('active');}

function filterCat(cat,el){
    curCat=cat;curView='cards';setActive(el);
    const labels={All:'All Processes',Sales:'Sales & CRM',Purchase:'Purchase & Inventory',Management:'Management (MIS)',HR:'HR & Admin',Finance:'Finance & Accounts',Support:'Help & Support','My System':'Google Site'};
    hdr.innerText=labels[cat]||cat;
    box.style.display='';
    document.getElementById('adminPanel').classList.remove('visible');
    document.getElementById('searchWrap').style.display='';
    runFilter();
}

function searchCards(){runFilter();}
function runFilter(){
    const raw=document.getElementById('searchInput').value.toLowerCase();
    const terms=raw.split(" ").filter(t=>t.trim());
    const filtered=DB.filter(it=>{
        const mc=curCat==='All'||it.cat===curCat;
        const txt=`${it.name} ${it.pc} ${it.solver} ${it.exec} ${it.cat}`.toLowerCase();
        return mc&&terms.every(t=>txt.includes(t));
    });
    renderCards(filtered);
}

/* ══ ADMIN ══ */
function showAdmin(el){
    if(!curUser||curUser.role!=='Admin')return;
    curView='admin';setActive(el);hdr.innerText='User Management';
    box.style.display='none';document.getElementById('adminPanel').classList.add('visible');document.getElementById('searchWrap').style.display='none';
    renderTable();
}
function renderTable(){
    const users=getUsers(),tb=document.getElementById('tblBody');tb.innerHTML='';
    users.forEach(u=>{
        const dp=u.deptAccess.map(d=>`<span class="ap ap-${d}">${d==='Management'?'MIS':d}</span>`).join('');
        const pp=(u.processAccess&&u.processAccess.length)?u.processAccess.map(p=>`<span style="font-size:10px;color:var(--text-2)">${p}</span>`).join(', '):'<span style="font-size:10px;color:var(--text-3)">All in dept</span>';
        tb.innerHTML+=`<tr><td><strong>${u.username}</strong></td><td>${u.name}</td><td><span class="role-pill ${u.role.toLowerCase()}">${u.role}</span></td><td><div class="access-pills">${dp}</div></td><td>${pp}</td><td><button class="tbl-act edit" onclick="editUser('${u.id}')" title="Edit"><i class="fas fa-pen"></i></button>${u.id!==curUser.id?`<button class="tbl-act delete" onclick="deleteUser('${u.id}')" title="Delete"><i class="fas fa-trash-can"></i></button>`:''}</td></tr>`;
    });
}

function openModal(uid){
    document.getElementById('editUserId').value='';
    document.getElementById('mName').value='';document.getElementById('mUser').value='';document.getElementById('mPass').value='';
    document.getElementById('mRole').value='Employee';document.getElementById('modalTitle').textContent='Add New User';
    document.querySelectorAll('#deptChks .chk-pill').forEach(p=>{p.classList.remove('checked');p.querySelector('input').checked=false;});
    buildProcList();
    if(uid){
        const u=getUsers().find(x=>x.id===uid);
        if(u){document.getElementById('editUserId').value=u.id;document.getElementById('mName').value=u.name;document.getElementById('mUser').value=u.username;document.getElementById('mPass').value=u.password;document.getElementById('mRole').value=u.role;document.getElementById('modalTitle').textContent='Edit User';
        document.querySelectorAll('#deptChks .chk-pill').forEach(p=>{if(u.deptAccess.includes(p.dataset.val)){p.classList.add('checked');p.querySelector('input').checked=true;}});
        if(u.processAccess&&u.processAccess.length)document.querySelectorAll('#procList input[type=checkbox]').forEach(cb=>{if(u.processAccess.includes(cb.value))cb.checked=true;});}
    }
    onRoleChange();document.getElementById('userModal').classList.add('show');
}
function editUser(id){openModal(id);}
function closeModal(){document.getElementById('userModal').classList.remove('show');}
function onRoleChange(){const r=document.getElementById('mRole').value;document.getElementById('deptField').style.display=r==='Admin'?'none':'';document.getElementById('procField').style.display=r==='Admin'?'none':'';}
function toggleChk(el){setTimeout(()=>{const cb=el.querySelector('input');cb.checked=!cb.checked;el.classList.toggle('checked',cb.checked);if(el.dataset.val==='All'&&cb.checked)document.querySelectorAll('#deptChks .chk-pill').forEach(p=>{if(p.dataset.val!=='All'){p.classList.remove('checked');p.querySelector('input').checked=false;}});else if(el.dataset.val!=='All'&&cb.checked){const a=document.querySelector('#deptChks .chk-pill[data-val="All"]');a.classList.remove('checked');a.querySelector('input').checked=false;}},0);}
function buildProcList(){const el=document.getElementById('procList');el.innerHTML='';DB.forEach(it=>{el.innerHTML+=`<label class="proc-item"><input type="checkbox" value="${it.name}"> ${it.name}</label>`;});}

function saveUser(){
    const id=document.getElementById('editUserId').value,name=document.getElementById('mName').value.trim();
    const username=document.getElementById('mUser').value.trim().toLowerCase(),password=document.getElementById('mPass').value,role=document.getElementById('mRole').value;
    if(!name||!username||!password){alert('Fill all required fields.');return;}
    let deptAccess=[];
    if(role==='Admin')deptAccess=['All'];
    else{document.querySelectorAll('#deptChks .chk-pill.checked').forEach(p=>deptAccess.push(p.dataset.val));if(!deptAccess.length){alert('Select at least one department.');return;}}
    let processAccess=[];document.querySelectorAll('#procList input:checked').forEach(cb=>processAccess.push(cb.value));
    const users=getUsers();if(users.find(u=>u.username.toLowerCase()===username&&u.id!==id)){alert('Username already exists.');return;}
    if(id){const idx=users.findIndex(u=>u.id===id);if(idx!==-1){users[idx]={...users[idx],name,username,password,role,deptAccess,processAccess};if(curUser.id===id){curUser=users[idx];setSess(curUser);document.getElementById('sAvatar').textContent=name.charAt(0).toUpperCase();document.getElementById('sName').textContent=name;document.getElementById('sRole').textContent=role;}}}
    else users.push({id:'u'+Date.now(),name,username,password,role,deptAccess,processAccess});
    saveUsers(users);closeModal();renderTable();
}
function deleteUser(id){if(!confirm('Delete this user?'))return;saveUsers(getUsers().filter(u=>u.id!==id));renderTable();}

/* ══ INIT ══ */
(function(){const s=getSess();if(s){const u=getUsers().find(x=>x.id===s.id&&x.password===s.password);if(u){enterApp(u);return;}}document.getElementById('loginOverlay').classList.remove('hidden');})();
</script>
