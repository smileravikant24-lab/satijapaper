<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satija Paper - System Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a2332;
            --primary-light: #2c3e50;
            --accent: #2563eb;
            --accent-light: #3b82f6;
            --accent-glow: rgba(37, 99, 235, 0.15);
            --bg-light: #f0f2f5;
            --bg-card: #ffffff;
            --sidebar-width: 270px;
            --text-primary: #1a2332;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --purple: #8b5cf6;
            --radius: 10px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        /* LOGIN SCREEN */
        .login-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            transition: opacity 0.5s, visibility 0.5s;
        }
        .login-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .login-bg-pattern {
            position: absolute; inset: 0;
            background-image: radial-gradient(circle at 20% 50%, rgba(37,99,235,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139,92,246,0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(16,185,129,0.05) 0%, transparent 50%);
            animation: bgShift 15s ease-in-out infinite alternate;
        }
        @keyframes bgShift { 0%{opacity:0.6} 100%{opacity:1} }

        .login-card {
            position: relative; width: 420px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; padding: 48px 40px;
            animation: loginSlideUp 0.6s cubic-bezier(0.16,1,0.3,1);
        }
        @keyframes loginSlideUp { from{opacity:0;transform:translateY(30px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }

        .login-brand { text-align: center; margin-bottom: 36px; }
        .login-brand-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            border-radius: 18px; display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 16px; font-size: 28px; color: white;
            box-shadow: 0 8px 30px rgba(37,99,235,0.3);
        }
        .login-brand h1 { font-family:'Playfair Display',serif; font-size:26px; font-weight:800; color:#fff; letter-spacing:1px; }
        .login-brand-url { font-size:12px; color:var(--accent-light); margin-top:4px; letter-spacing:0.5px; }
        .login-brand-sub { font-size:13px; color:rgba(255,255,255,0.4); margin-top:8px; font-weight:500; }

        .login-role-tabs { display:flex; gap:8px; margin-bottom:28px; background:rgba(255,255,255,0.05); border-radius:12px; padding:4px; }
        .login-role-tab {
            flex:1; padding:12px; border:none; background:transparent; color:rgba(255,255,255,0.5);
            font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer;
            border-radius:10px; transition:var(--transition); display:flex; align-items:center; justify-content:center; gap:8px;
        }
        .login-role-tab.active { background:var(--accent); color:white; box-shadow:0 4px 15px rgba(37,99,235,0.4); }
        .login-role-tab:hover:not(.active) { color:rgba(255,255,255,0.8); background:rgba(255,255,255,0.08); }

        .login-field { margin-bottom:18px; }
        .login-field label { display:block; font-size:12px; font-weight:600; color:rgba(255,255,255,0.5); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.8px; }
        .login-input-wrap { position:relative; }
        .login-input-wrap > i { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:rgba(255,255,255,0.25); font-size:15px; transition:var(--transition); }
        .login-input {
            width:100%; padding:14px 16px 14px 46px;
            background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
            border-radius:12px; color:#fff; font-size:14px; font-family:'DM Sans',sans-serif;
            outline:none; transition:var(--transition);
        }
        .login-input::placeholder { color:rgba(255,255,255,0.25); }
        .login-input:focus { border-color:var(--accent); background:rgba(37,99,235,0.08); box-shadow:0 0 0 3px rgba(37,99,235,0.15); }

        .login-btn {
            width:100%; padding:15px;
            background:linear-gradient(135deg, var(--accent), #4f46e5);
            border:none; border-radius:12px; color:white; font-size:15px; font-weight:700;
            font-family:'DM Sans',sans-serif; cursor:pointer; transition:var(--transition); margin-top:8px;
        }
        .login-btn:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(37,99,235,0.4); }
        .login-btn:active { transform:translateY(0); }

        .login-error {
            background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.3); color:#fca5a5;
            padding:11px 14px; border-radius:10px; font-size:13px; margin-bottom:16px;
            display:none; align-items:center; gap:8px;
        }
        .login-error.show { display:flex; }

        .toggle-password {
            position:absolute; right:14px; top:50%; transform:translateY(-50%);
            background:none; border:none; color:rgba(255,255,255,0.3); cursor:pointer; font-size:14px; padding:4px;
        }
        .toggle-password:hover { color:rgba(255,255,255,0.6); }

        /* APP LAYOUT */
        .app-container { display:none; height:100vh; }
        .app-container.visible { display:flex; }

        .sidebar {
            width:var(--sidebar-width); background:var(--primary); display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto;
        }
        .brand-box {
            padding:24px 20px 20px; display:flex; flex-direction:column; align-items:center; gap:8px;
            border-bottom:1px solid rgba(255,255,255,0.08); margin-bottom:8px;
        }
        .brand-logo { width:64px; height:64px; object-fit:contain; border-radius:50%; padding:2px; }
        .brand-text { color:#fff; font-family:'Playfair Display',serif; font-size:18px; font-weight:800; letter-spacing:1.5px; }
        .brand-url { color:var(--accent-light); font-size:11px; text-decoration:none; font-weight:500; }
        .brand-url:hover { text-decoration:underline; }

        .sidebar-section-label { padding:16px 24px 6px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.2px; color:rgba(255,255,255,0.3); }

        .menu-btn {
            background:none; border:none; padding:12px 24px; text-align:left; font-size:13.5px;
            color:rgba(255,255,255,0.6); cursor:pointer; transition:var(--transition);
            display:flex; align-items:center; gap:12px; border-left:3px solid transparent;
            font-family:'DM Sans',sans-serif; font-weight:500;
        }
        .menu-btn i { width:18px; text-align:center; font-size:14px; }
        .menu-btn:hover { background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.9); }
        .menu-btn.active { background:rgba(37,99,235,0.15); color:var(--accent-light); border-left-color:var(--accent-light); font-weight:600; }

        .sidebar-user-box {
            margin-top:auto; padding:16px 20px; border-top:1px solid rgba(255,255,255,0.08);
            display:flex; align-items:center; gap:12px;
        }
        .sidebar-user-avatar {
            width:38px; height:38px; border-radius:10px;
            background:linear-gradient(135deg, var(--accent), var(--purple));
            display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:14px; flex-shrink:0;
        }
        .sidebar-user-info { flex:1; min-width:0; }
        .sidebar-user-name { font-size:13px; font-weight:600; color:rgba(255,255,255,0.85); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .sidebar-user-role { font-size:11px; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
        .sidebar-logout-btn {
            background:none; border:none; color:rgba(255,255,255,0.3); cursor:pointer; font-size:16px; padding:6px; border-radius:8px; transition:var(--transition);
        }
        .sidebar-logout-btn:hover { color:var(--danger); background:rgba(239,68,68,0.1); }

        /* MAIN */
        .main-content { flex:1; padding:0; overflow-y:auto; display:flex; flex-direction:column; }
        .header-area {
            display:flex; justify-content:space-between; align-items:center;
            background:var(--bg-card); padding:16px 32px; border-bottom:1px solid var(--border);
            position:sticky; top:0; z-index:100;
        }
        .page-title { font-size:20px; font-weight:700; color:var(--text-primary); }
        .header-right { display:flex; align-items:center; gap:16px; }
        .search-container { position:relative; width:280px; }
        .search-box {
            padding:10px 14px 10px 38px; border:1.5px solid var(--border); border-radius:10px; width:100%;
            outline:none; transition:var(--transition); font-size:13px; font-family:'DM Sans',sans-serif; background:var(--bg-light);
        }
        .search-box:focus { border-color:var(--accent); background:white; }
        .search-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:13px; }

        .content-area { padding:24px 32px 60px; flex:1; }

        /* CARDS */
        .grid-container { display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr)); gap:20px; }
        .card {
            background:var(--bg-card); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow-sm);
            border:1px solid var(--border); border-top:3px solid var(--accent);
            display:flex; flex-direction:column; transition:var(--transition); animation:cardFadeIn 0.4s ease both;
        }
        @keyframes cardFadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .card:hover { transform:translateY(-3px); box-shadow:var(--shadow-md); }
        .card-header h3 { font-size:16px; font-weight:700; color:var(--text-primary); margin-bottom:14px; }
        .card-cat-tag {
            display:inline-block; font-size:10px; font-weight:700; text-transform:uppercase;
            letter-spacing:0.8px; padding:3px 8px; border-radius:5px; margin-bottom:10px;
        }
        .tag-Sales { background:#dbeafe; color:#1e40af; }
        .tag-Purchase { background:#dcfce7; color:#166534; }
        .tag-Management { background:#fef3c7; color:#92400e; }
        .tag-HR { background:#f3e8ff; color:#6b21a8; }
        .tag-Finance { background:#ffe4e6; color:#9f1239; }

        .people-info { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
        .role-group { display:flex; flex-direction:column; gap:3px; }
        .role-label { font-size:9px; text-transform:uppercase; color:var(--text-muted); font-weight:700; letter-spacing:0.6px; margin-left:2px; }
        .badge {
            padding:4px 10px; border-radius:6px; background:var(--bg-light); border:1px solid var(--border);
            color:var(--text-primary); display:flex; align-items:center; gap:6px; font-size:12px; font-weight:500;
        }
        .badge i { font-size:11px; }
        .b-pc { border-left:3px solid var(--purple); } .b-pc i { color:var(--purple); }
        .b-solver { border-left:3px solid var(--warning); } .b-solver i { color:var(--warning); }
        .b-exec { border-left:3px solid var(--success); } .b-exec i { color:var(--success); }

        .action-area { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:auto; }
        .btn {
            text-decoration:none; padding:8px 6px; border-radius:8px; font-size:12px; text-align:center;
            font-weight:600; display:flex; align-items:center; justify-content:center; gap:5px;
            transition:var(--transition); font-family:'DM Sans',sans-serif; position:relative;
        }
        .btn:hover { filter:brightness(0.93); transform:translateY(-1px); }
        .btn-fms { background:#dbeafe; color:#1e40af; }
        .btn-form { background:#f3e8ff; color:#6b21a8; }
        .btn-sheet { background:#dcfce7; color:#166534; }
        .btn-check { background:#ffedd5; color:#9a3412; }
        .btn-video { background:#fee2e2; color:#b91c1c; }
        .btn-dash { background:#e0f2fe; color:#075985; }
        .btn-admin { background:#fef3c7; color:#92400e; }
        .btn-gp { background:#ede9fe; color:#5b21b6; }

        .btn.disabled-link { opacity:0.35; pointer-events:none; cursor:not-allowed; }
        .access-denied-badge {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            background:rgba(0,0,0,0.7); color:white; font-size:9px; padding:2px 6px;
            border-radius:4px; white-space:nowrap; font-weight:600; letter-spacing:0.5px;
        }

        .empty-state { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--text-muted); }
        .empty-state i { font-size:36px; margin-bottom:12px; display:block; }

        /* ADMIN PANEL */
        .admin-panel { display:none; }
        .admin-panel.visible { display:block; }
        .admin-header-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
        .admin-header-row h3 { font-size:18px; font-weight:700; }
        .add-user-btn {
            padding:10px 20px; background:var(--accent); color:white; border:none; border-radius:10px;
            font-size:13px; font-weight:600; font-family:'DM Sans',sans-serif; cursor:pointer;
            display:flex; align-items:center; gap:8px; transition:var(--transition);
        }
        .add-user-btn:hover { background:#1d4ed8; transform:translateY(-1px); box-shadow:0 4px 15px rgba(37,99,235,0.3); }

        .users-table-wrap { background:var(--bg-card); border-radius:var(--radius); border:1px solid var(--border); overflow:hidden; box-shadow:var(--shadow-sm); }
        .users-table { width:100%; border-collapse:collapse; }
        .users-table th {
            background:var(--bg-light); padding:12px 18px; text-align:left; font-size:11px;
            font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-secondary); border-bottom:1px solid var(--border);
        }
        .users-table td { padding:14px 18px; font-size:13px; border-bottom:1px solid var(--border); color:var(--text-primary); }
        .users-table tr:last-child td { border-bottom:none; }
        .users-table tr:hover td { background:#f8fafc; }

        .role-pill { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
        .role-pill.admin { background:#fee2e2; color:#b91c1c; }
        .role-pill.employee { background:#dbeafe; color:#1e40af; }

        .access-pills { display:flex; flex-wrap:wrap; gap:4px; }
        .access-pill { font-size:10px; padding:2px 8px; border-radius:12px; font-weight:600; }
        .ap-Sales { background:#dbeafe; color:#1e40af; }
        .ap-Purchase { background:#dcfce7; color:#166534; }
        .ap-Management { background:#fef3c7; color:#92400e; }
        .ap-HR { background:#f3e8ff; color:#6b21a8; }
        .ap-Finance { background:#ffe4e6; color:#9f1239; }
        .ap-All { background:#1a2332; color:white; }

        .tbl-action-btn { background:none; border:none; cursor:pointer; padding:6px 8px; border-radius:6px; transition:var(--transition); font-size:14px; }
        .tbl-action-btn:hover { background:var(--bg-light); }
        .tbl-action-btn.edit { color:var(--accent); }
        .tbl-action-btn.delete { color:var(--danger); }

        /* MODAL */
        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px);
            z-index:5000; display:none; align-items:center; justify-content:center;
        }
        .modal-overlay.show { display:flex; }
        .modal-card {
            background:white; border-radius:16px; width:480px; max-height:90vh; overflow-y:auto;
            box-shadow:var(--shadow-lg); animation:modalSlideUp 0.3s cubic-bezier(0.16,1,0.3,1);
        }
        @keyframes modalSlideUp { from{transform:translateY(20px) scale(0.97);opacity:0} to{transform:translateY(0) scale(1);opacity:1} }

        .modal-header { display:flex; justify-content:space-between; align-items:center; padding:20px 24px; border-bottom:1px solid var(--border); }
        .modal-header h3 { font-size:17px; font-weight:700; }
        .modal-close { background:none; border:none; font-size:18px; color:var(--text-muted); cursor:pointer; padding:4px 8px; border-radius:8px; transition:var(--transition); }
        .modal-close:hover { background:var(--bg-light); color:var(--text-primary); }

        .modal-body { padding:24px; }
        .modal-field { margin-bottom:18px; }
        .modal-field label { display:block; font-size:12px; font-weight:600; color:var(--text-secondary); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
        .modal-input, .modal-select {
            width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:10px;
            font-size:14px; font-family:'DM Sans',sans-serif; outline:none; transition:var(--transition); background:white;
        }
        .modal-input:focus, .modal-select:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }

        .checkbox-group { display:flex; flex-wrap:wrap; gap:8px; }
        .checkbox-pill {
            display:flex; align-items:center; gap:6px; padding:8px 14px;
            border:1.5px solid var(--border); border-radius:10px; cursor:pointer;
            transition:var(--transition); font-size:13px; font-weight:500; user-select:none;
        }
        .checkbox-pill:hover { border-color:var(--accent); background:var(--accent-glow); }
        .checkbox-pill.checked { background:var(--accent); color:white; border-color:var(--accent); }
        .checkbox-pill input { display:none; }

        .modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }
        .modal-btn {
            padding:10px 22px; border-radius:10px; font-size:13px; font-weight:600;
            font-family:'DM Sans',sans-serif; cursor:pointer; border:none; transition:var(--transition);
        }
        .modal-btn.secondary { background:var(--bg-light); color:var(--text-secondary); }
        .modal-btn.secondary:hover { background:#e2e8f0; }
        .modal-btn.primary { background:var(--accent); color:white; }
        .modal-btn.primary:hover { background:#1d4ed8; }

        .process-access-section { margin-top:6px; }
        .process-access-section summary { cursor:pointer; font-size:12px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.5px; padding:6px 0; user-select:none; }
        .process-access-section summary:hover { color:var(--accent); }
        .process-checklist { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:8px; max-height:200px; overflow-y:auto; padding:4px; }
        .process-check-item { display:flex; align-items:center; gap:6px; font-size:12px; padding:6px 8px; border-radius:6px; cursor:pointer; transition:var(--transition); }
        .process-check-item:hover { background:var(--bg-light); }
        .process-check-item input { accent-color:var(--accent); }

        @media (max-width:768px) {
            .sidebar { display:none; }
            .header-area { padding:12px 16px; }
            .content-area { padding:16px; }
            .grid-container { grid-template-columns:1fr; }
            .login-card { width:92%; padding:32px 24px; }
            .search-container { width:200px; }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
    <div class="login-bg-pattern"></div>

/* AUTH SYSTEM */
const STORAGE_KEY = "satija_users";
const SESSION_KEY = "satija_session";

const defaultUsers = [
    { id:"u1", name:"Admin", username:"admin", password:"admin@123", role:"Admin", deptAccess:["All"], processAccess:[] },
    { id:"u2", name:"Neha", username:"neha", password:"neha@123", role:"Employee", deptAccess:["Sales","HR","Management"], processAccess:[] },
    { id:"u3", name:"Khushi", username:"khushi", password:"khushi@123", role:"Employee", deptAccess:["Sales","Purchase"], processAccess:[] },
    { id:"u4", name:"Mukesh", username:"mukesh", password:"mukesh@123", role:"Employee", deptAccess:["Sales","Purchase","Finance"], processAccess:[] },
    { id:"u5", name:"Preksha", username:"preksha", password:"preksha@123", role:"Admin", deptAccess:["All"], processAccess:[] }
];

function getUsers() {
    const s = localStorage.getItem(STORAGE_KEY);
    if (!s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultUsers)); return [...defaultUsers]; }
    return JSON.parse(s);
}
function saveUsers(u) { localStorage.setItem(STORAGE_KEY, JSON.stringify(u)); }
function getSession() { const s=localStorage.getItem(SESSION_KEY); return s?JSON.parse(s):null; }
function setSession(u) { localStorage.setItem(SESSION_KEY, JSON.stringify(u)); }
function clearSession() { localStorage.removeItem(SESSION_KEY); }

let selectedLoginRole = "Employee";
function setLoginRole(r) {
    selectedLoginRole = r;
    document.getElementById('tabEmployee').classList.toggle('active', r==='Employee');
    document.getElementById('tabAdmin').classList.toggle('active', r==='Admin');
    document.getElementById('loginError').classList.remove('show');
}

function togglePwdVisibility() {
    const i=document.getElementById('loginPass'), ic=document.getElementById('pwdEyeIcon');
    if(i.type==='password'){i.type='text';ic.className='fas fa-eye-slash';}else{i.type='password';ic.className='fas fa-eye';}
}

function handleLogin() {
    const u=document.getElementById('loginUser').value.trim().toLowerCase(), p=document.getElementById('loginPass').value;
    const err=document.getElementById('loginError'), msg=document.getElementById('loginErrorMsg');
    if(!u||!p){msg.textContent="Please enter both username and password.";err.classList.add('show');return;}
    const users=getUsers(), found=users.find(x=>x.username.toLowerCase()===u&&x.password===p);
    if(!found){msg.textContent="Invalid username or password.";err.classList.add('show');return;}
    if(found.role!==selectedLoginRole){msg.textContent=`This account is registered as ${found.role}, not ${selectedLoginRole}.`;err.classList.add('show');return;}
    err.classList.remove('show'); setSession(found); enterApp(found);
}

document.addEventListener('keydown',function(e){if(e.key==='Enter'&&!document.getElementById('loginOverlay').classList.contains('hidden'))handleLogin();});

function handleLogout() {
    clearSession();
    document.getElementById('appContainer').classList.remove('visible');
    document.getElementById('loginOverlay').classList.remove('hidden');
    document.getElementById('loginUser').value=''; document.getElementById('loginPass').value='';
    document.getElementById('loginError').classList.remove('show'); currentView='cards';
}

let currentUser=null, currentCategory='All', currentView='cards';

function enterApp(user) {
    currentUser=user;
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('appContainer').classList.add('visible');
    document.getElementById('sidebarAvatar').textContent=user.name.charAt(0).toUpperCase();
    document.getElementById('sidebarUserName').textContent=user.name;
    document.getElementById('sidebarUserRole').textContent=user.role;
    const isAdmin=user.role==='Admin';
    document.getElementById('adminNavLabel').style.display=isAdmin?'':'none';
    document.getElementById('adminNavBtn').style.display=isAdmin?'':'none';
    currentCategory='All'; currentView='cards';
    setActiveMenu(document.querySelector('.menu-btn'));
    runFilter();
}

function userHasDeptAccess(u,cat){if(!u)return false;if(u.role==='Admin')return true;if(u.deptAccess.includes('All'))return true;return u.deptAccess.includes(cat);}
function userHasProcessAccess(u,name){if(!u)return false;if(u.role==='Admin')return true;if(!u.processAccess||u.processAccess.length===0)return true;return u.processAccess.includes(name);}

const container=document.getElementById('cardContainer'), header=document.getElementById('pageHeader');

function renderCards(data) {
    container.innerHTML="";
    if(!data.length){container.innerHTML=`<div class="empty-state"><i class="fas fa-inbox"></i><p>No processes found matching your search.</p></div>`;return;}
    data.forEach((item,idx)=>{
        const hasDept=userHasDeptAccess(currentUser,item.cat), hasProc=userHasProcessAccess(currentUser,item.name);
        const ok=hasDept&&hasProc, dc=ok?'':' disabled-link';
        const mb=(url,cls,icon,label)=>{
            if(!url)return '';
            return `<a href="${ok?url:'#'}" ${ok?'target="_blank"':''} class="btn ${cls}${dc}" ${!ok?'onclick="return false;"':''}>
                <i class="${icon}"></i> ${label}${!ok?'<span class="access-denied-badge"><i class="fas fa-lock"></i> Locked</span>':''}
            </a>`;
        };
        let btns='';
        btns+=mb(item.links.fms,'btn-fms','fas fa-table','FMS');
        btns+=mb(item.links.form,'btn-form','fab fa-google-drive','Form');
        btns+=mb(item.links.sheet,'btn-sheet','fas fa-file-excel','Sheet');
        btns+=mb(item.links.check,'btn-check','fas fa-check-square','Checklist');
        btns+=mb(item.links.video,'btn-video','fas fa-play-circle','Training');
        btns+=mb(item.links.videoBCI,'btn-video','fas fa-play-circle','Training (BCI)');
        btns+=mb(item.links.dashEmp,'btn-dash','fas fa-chart-pie','Emp Dashboard');
        btns+=mb(item.links.dashPC,'btn-dash','fas fa-chart-line','PC Dashboard');
        btns+=mb(item.links.admin,'btn-admin','fas fa-user-cog','Admin Dashboard');
        btns+=mb(item.links.gpDash,'btn-gp','fas fa-chart-bar','GP Dashboard');
        if(!btns)btns=`<div style="grid-column:span 2;text-align:center;color:#ccc;font-size:12px;">No Links Added</div>`;
        let badges='';
        if(item.pc&&item.pc!=="-")badges+=`<div class="role-group"><span class="role-label">PC/EA</span><span class="badge b-pc"><i class="fas fa-user-shield"></i> ${item.pc}</span></div>`;
        if(item.solver&&item.solver!=="-")badges+=`<div class="role-group"><span class="role-label">Solver</span><span class="badge b-solver"><i class="fas fa-tools"></i> ${item.solver}</span></div>`;
        if(item.exec&&item.exec!=="-")badges+=`<div class="role-group"><span class="role-label">Executive</span><span class="badge b-exec"><i class="fas fa-user"></i> ${item.exec}</span></div>`;
        container.innerHTML+=`<div class="card" style="animation-delay:${idx*0.04}s;${!ok?'opacity:0.55;':''}"><div class="card-header"><span class="card-cat-tag tag-${item.cat}">${item.cat}</span><h3>${item.name}</h3><div class="people-info">${badges}</div></div><div class="action-area">${btns}</div></div>`;
    });
}

function setActiveMenu(el){document.querySelectorAll('.menu-btn').forEach(b=>b.classList.remove('active'));if(el)el.classList.add('active');}

function filterCategory(cat,el){
    currentCategory=cat; currentView='cards'; setActiveMenu(el);
    header.innerText=cat==='All'?'All Processes':cat+' Department';
    document.getElementById('cardContainer').style.display='';
    document.getElementById('adminPanel').classList.remove('visible');
    document.getElementById('searchWrap').style.display='';
    runFilter();
}

function searchCards(){runFilter();}

function runFilter(){
    const raw=document.getElementById('searchInput').value.toLowerCase();
    const terms=raw.split(" ").filter(t=>t.trim()!=="");
    const filtered=database.filter(item=>{
        const mc=currentCategory==='All'||item.cat===currentCategory;
        const txt=`${item.name} ${item.pc} ${item.solver} ${item.exec} ${item.cat}`.toLowerCase();
        return mc&&terms.every(t=>txt.includes(t));
    });
    renderCards(filtered);
}

/* ADMIN */
function showUserManagement(el){
    if(!currentUser||currentUser.role!=='Admin')return;
    currentView='admin'; setActiveMenu(el);
    header.innerText='User Management';
    document.getElementById('cardContainer').style.display='none';
    document.getElementById('adminPanel').classList.add('visible');
    document.getElementById('searchWrap').style.display='none';
    renderUsersTable();
}

function renderUsersTable(){
    const users=getUsers(), tb=document.getElementById('usersTableBody'); tb.innerHTML='';
    users.forEach(u=>{
        const dp=u.deptAccess.map(d=>`<span class="access-pill ap-${d}">${d==='Management'?'MIS':d}</span>`).join('');
        const pp=(u.processAccess&&u.processAccess.length>0)?u.processAccess.map(p=>`<span style="font-size:10px;color:var(--text-secondary);">${p}</span>`).join(', '):'<span style="font-size:11px;color:var(--text-muted);">All in dept</span>';
        tb.innerHTML+=`<tr><td><strong>${u.username}</strong></td><td>${u.name}</td><td><span class="role-pill ${u.role.toLowerCase()}">${u.role}</span></td><td><div class="access-pills">${dp}</div></td><td>${pp}</td><td><button class="tbl-action-btn edit" onclick="editUser('${u.id}')" title="Edit"><i class="fas fa-pen"></i></button>${u.id!==currentUser.id?`<button class="tbl-action-btn delete" onclick="deleteUser('${u.id}')" title="Delete"><i class="fas fa-trash"></i></button>`:''}</td></tr>`;
    });
}

function openUserModal(uid){
    document.getElementById('editUserId').value='';
    document.getElementById('modalName').value='';
    document.getElementById('modalUsername').value='';
    document.getElementById('modalPassword').value='';
    document.getElementById('modalRole').value='Employee';
    document.getElementById('modalTitle').textContent='Add New User';
    document.querySelectorAll('#deptCheckboxes .checkbox-pill').forEach(p=>{p.classList.remove('checked');p.querySelector('input').checked=false;});
    buildProcessChecklist();
    if(uid){
        const u=getUsers().find(x=>x.id===uid);
        if(u){
            document.getElementById('editUserId').value=u.id;
            document.getElementById('modalName').value=u.name;
            document.getElementById('modalUsername').value=u.username;
            document.getElementById('modalPassword').value=u.password;
            document.getElementById('modalRole').value=u.role;
            document.getElementById('modalTitle').textContent='Edit User';
            document.querySelectorAll('#deptCheckboxes .checkbox-pill').forEach(p=>{
                if(u.deptAccess.includes(p.dataset.val)){p.classList.add('checked');p.querySelector('input').checked=true;}
            });
            if(u.processAccess&&u.processAccess.length>0){
                document.querySelectorAll('#processChecklist input[type=checkbox]').forEach(cb=>{if(u.processAccess.includes(cb.value))cb.checked=true;});
            }
        }
    }
    onModalRoleChange();
    document.getElementById('userModal').classList.add('show');
}

function editUser(id){openUserModal(id);}
function closeUserModal(){document.getElementById('userModal').classList.remove('show');}

function onModalRoleChange(){
    const r=document.getElementById('modalRole').value;
    document.getElementById('deptAccessField').style.display=r==='Admin'?'none':'';
    document.getElementById('processAccessField').style.display=r==='Admin'?'none':'';
}

function toggleCheckPill(el){
    setTimeout(()=>{
        const cb=el.querySelector('input'); cb.checked=!cb.checked; el.classList.toggle('checked',cb.checked);
        if(el.dataset.val==='All'&&cb.checked){
            document.querySelectorAll('#deptCheckboxes .checkbox-pill').forEach(p=>{if(p.dataset.val!=='All'){p.classList.remove('checked');p.querySelector('input').checked=false;}});
        }else if(el.dataset.val!=='All'&&cb.checked){
            const a=document.querySelector('#deptCheckboxes .checkbox-pill[data-val="All"]');a.classList.remove('checked');a.querySelector('input').checked=false;
        }
    },0);
}

function buildProcessChecklist(){
    const el=document.getElementById('processChecklist'); el.innerHTML='';
    database.forEach(item=>{el.innerHTML+=`<label class="process-check-item"><input type="checkbox" value="${item.name}"> ${item.name}</label>`;});
}

function saveUser(){
    const id=document.getElementById('editUserId').value, name=document.getElementById('modalName').value.trim();
    const username=document.getElementById('modalUsername').value.trim().toLowerCase();
    const password=document.getElementById('modalPassword').value, role=document.getElementById('modalRole').value;
    if(!name||!username||!password){alert('Please fill in all required fields.');return;}
    let deptAccess=[];
    if(role==='Admin'){deptAccess=['All'];}
    else{document.querySelectorAll('#deptCheckboxes .checkbox-pill.checked').forEach(p=>{deptAccess.push(p.dataset.val);});if(!deptAccess.length){alert('Please select at least one department.');return;}}
    let processAccess=[];
    document.querySelectorAll('#processChecklist input[type=checkbox]:checked').forEach(cb=>{processAccess.push(cb.value);});
    const users=getUsers();
    if(users.find(u=>u.username.toLowerCase()===username&&u.id!==id)){alert('Username already exists.');return;}
    if(id){
        const idx=users.findIndex(u=>u.id===id);
        if(idx!==-1){users[idx]={...users[idx],name,username,password,role,deptAccess,processAccess};
        if(currentUser.id===id){currentUser=users[idx];setSession(currentUser);document.getElementById('sidebarAvatar').textContent=name.charAt(0).toUpperCase();document.getElementById('sidebarUserName').textContent=name;document.getElementById('sidebarUserRole').textContent=role;}}
    }else{users.push({id:'u'+Date.now(),name,username,password,role,deptAccess,processAccess});}
    saveUsers(users); closeUserModal(); renderUsersTable();
}

function deleteUser(id){if(!confirm('Delete this user?'))return;saveUsers(getUsers().filter(u=>u.id!==id));renderUsersTable();}

/* AUTO-LOGIN */
(function(){
    const s=getSession();
    if(s){const u=getUsers().find(x=>x.id===s.id&&x.password===s.password);if(u){enterApp(u);return;}}
    document.getElementById('loginOverlay').classList.remove('hidden');
})();

document.addEventListener("contextmenu",e=>e.preventDefault());
document.onkeydown=function(e){if(e.keyCode==123)return false;if(e.ctrlKey&&e.shiftKey&&e.keyCode==73)return false;if(e.ctrlKey&&e.keyCode==85)return false;};
